name: Release

# Trigger on tags matching v*.*.* (e.g. v0.1.0, v1.2.3-rc1).
# The release job uploads to TestPyPI first, then PyPI when you cut a
# stable semver tag (no hyphen in the version).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Upload target"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read
  id-token: write   # Required for PyPI trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Extract version
        id: meta
        run: |
          VERSION=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *[-a-zA-Z]* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if tag and pyproject version disagree
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          [[ "$TAG" == "${{ steps.meta.outputs.version }}" ]] || {
            echo "::error::Tag $TAG disagrees with pyproject.toml version ${{ steps.meta.outputs.version }}"
            exit 1
          }

      - name: Build
        run: python -m build

      - name: Check metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.is_prerelease == 'true' || github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/simeng/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.is_prerelease == 'false' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/simeng/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
